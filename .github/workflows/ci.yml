name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          # Pinned via global.json (sdk version + rollForward).
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Photography.slnx

      - name: Build
        run: dotnet build Photography.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Photography.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./TestResults
          if-no-files-found: ignore

  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npx vitest run --reporter=default

      - name: E2E
        run: |
          npm run dev -- --host 127.0.0.1 > /tmp/photography-vite.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT

          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/photography-vite.log
              exit 1
            fi
            sleep 1
          done

          npm run e2e
