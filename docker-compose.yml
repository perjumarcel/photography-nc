version: "3.9"

# Local-development stack. Brings up Postgres + the API; the Vite dev server
# is intentionally NOT containerised so frontend HMR works at full speed
# (`cd client && npm run dev`). The Vite dev proxy already forwards `/api/*`
# to http://localhost:5080 — see `client/vite.config.ts`.
#
# Quick start:
#   docker compose up -d postgres
#   docker compose up api
#
# Bring everything down (and wipe Postgres data):
#   docker compose down -v

services:
  postgres:
    image: postgres:17-alpine
    container_name: photography-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: photography
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photography"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Photography.Web/Dockerfile
    container_name: photography-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=photography;Username=postgres;Password=postgres"
      # Generate a long random key for any non-trivial deployment; this dev
      # value is intentionally weak and only suitable for `compose up`.
      Jwt__Key: "dev-only-do-not-use-in-production-please-replace-me"
      Cors__AllowedOrigins__0: "http://localhost:5173"
      Storage__Provider: "Local"
      Storage__Local__RootPath: "/app/_storage"
      Storage__Local__PublicBaseUrl: "/local-storage"
    ports:
      - "5080:8080"
    volumes:
      - api-storage:/app/_storage

volumes:
  postgres-data:
  api-storage:
